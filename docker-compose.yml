services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clideck_mcp
      POSTGRES_USER: clideck_app
      POSTGRES_PASSWORD: clideck_dev_only
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clideck_app -d clideck_mcp"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - clideck-postgres:/var/lib/postgresql/data

volumes:
  clideck-postgres:
