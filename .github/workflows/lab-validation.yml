name: Lab validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: lab/requirements.txt
      - run: pnpm install --frozen-lockfile
      - name: Start pinned Batfish
        run: >-
          docker run --detach --name batfish
          --publish 8888:8888 --publish 9996:9996
          batfish/allinone:2025.07.07.2423
      - name: Install pinned Pybatfish
        run: python -m pip install --requirement lab/requirements.txt
      - name: Wait for Batfish
        run: |
          for attempt in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:9996/v2/version >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs batfish
          exit 1
      - name: Validate Cisco configuration model
        run: python lab/batfish/run_validation.py
      - name: Install pinned containerlab
        env:
          CLAB_VERSION: 0.72.0
        run: bash -c "$(curl --proto '=https' --tlsv1.2 -fsSL https://get.containerlab.dev)" -- -v "${CLAB_VERSION}"
      - name: Run open-image parser lab
        run: |
          sudo containerlab deploy --topo lab/containerlab/clideck-runtime.clab.yml
          sleep 5
          docker exec clab-clideck-runtime-r1 \
            vtysh -c "show ip route 10.20.20.0/24" \
            > lab/results/runtime-route.txt
          pnpm lab:check-runtime \
            lab/results/runtime-route.txt \
            lab/results/runtime.json
      - name: Build commit-bound report
        run: >-
          pnpm lab:build-report
          lab/results/batfish.json
          lab/results/runtime.json
          lab/results/report.json
      - name: Destroy runtime lab
        if: always()
        run: >-
          sudo containerlab destroy --cleanup
          --topo lab/containerlab/clideck-runtime.clab.yml || true
      - uses: actions/upload-artifact@v4
        with:
          name: clideck-lab-report-${{ github.sha }}
          path: lab/results/report.json
          if-no-files-found: error
          retention-days: 30
